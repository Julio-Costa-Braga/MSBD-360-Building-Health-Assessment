services:
  - type: web
    name: msbd360-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: msbd360-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: msbd360-db
    databaseName: msbd360
    user: msbd
    plan: free
